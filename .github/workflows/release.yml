name: Release Build & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'

      - run: flutter pub get

      - name: Create .env for build
        run: |
          echo "SUPABASE_URL=https://placeholder.supabase.co" > .env
          echo "SUPABASE_ANON_KEY=placeholder_key" >> .env

      - run: flutter build apk --release

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk E-Ticketing-Helpdesk-v1.0.3.apk

      - name: Upload APK
        uses: softprops/action-gh-release@v1
        with:
          files: E-Ticketing-Helpdesk-v1.0.3.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
